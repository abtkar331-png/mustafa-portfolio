<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0545"/>
      <stop offset="100%" stop-color="#02041e"/>
    </linearGradient>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="55%" stop-color="#977dff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Neon border -->
  <rect width="62" height="62" x="1" y="1" rx="13" fill="none" stroke="url(#mg)" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Subtle top sheen -->
  <rect x="14" y="1" width="36" height="1" rx="0.5" fill="white" fill-opacity="0.25"/>

  <!-- Letter M — using path for crisp rendering at small sizes -->
  <path
    d="M13 46 L13 18 L19 18 L32 36 L45 18 L51 18 L51 46 L45 46 L45 28 L34 44 L30 44 L19 28 L19 46 Z"
    fill="url(#mg)"
    filter="url(#glow)"
  />
</svg>
